name: quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: run actionlint with reviewdog
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          filter_mode: diff_context
          fail_level: error

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    if: ${{ false }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: github_actions
          soft_fail: false

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    if: ${{ false }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: run trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
